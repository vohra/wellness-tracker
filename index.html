<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Wellness Tracker 🌿</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0c0c10; color:#f0ede8; font-family:'DM Sans',system-ui,sans-serif; }
  input, textarea, button { font-family:inherit; }
  input[type=date]::-webkit-calendar-picker-indicator { filter:invert(1); }
  ::-webkit-scrollbar { width:4px; } ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.1); border-radius:2px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

const SHEETS_URL = "https://script.google.com/macros/s/AKfycbyCildU0gZoVHEdUnPbtTAb9-yXv0-sP1h2ua9EL8a4fBLE2YWMPQbB_IRcIicMvCan/exec";
const STORAGE_KEY = "wellness-data";
const PROGRAM_START = "2026-06-01";
const GOAL_WEIGHT = 67;
const START_WEIGHT = 72;
const CALORIE_TARGET = 1450;
const WATER_TARGET = 2500;
const STEPS_TARGET = 6000;
const PROTEIN_TARGET = 100;
const CARBS_TARGET = 150;
const FAT_TARGET = 50;
const FIBER_TARGET = 25;

const todayStr = () => new Date().toISOString().split("T")[0];
const weekNumber = (dateStr) => {
  const start = new Date(PROGRAM_START);
  const d = new Date(dateStr);
  return Math.min(8, Math.floor((d - start) / (7 * 86400000)) + 1);
};
const defaultDay = (date) => ({
  date, weight:"", calories:0, water:0, steps:0,
  protein:0, carbs:0, fat:0, fiber:0,
  prenatal:false, magnesium:false, workout:false,
  workoutType:"", hadFruit:false, foods:[], notes:"",
});

async function sheetsSet(key, value) {
  try {
    // Split into chunks of 1500 chars to stay under URL limits
    const chunkSize = 1500;
    if (value.length <= chunkSize) {
      const res = await fetch(`${SHEETS_URL}?action=set&key=${encodeURIComponent(key)}&value=${encodeURIComponent(value)}`);
      const data = await res.json();
      return data.success === true;
    }
    // For large payloads, save in numbered chunks
    const chunks = [];
    for (let i = 0; i < value.length; i += chunkSize) {
      chunks.push(value.slice(i, i + chunkSize));
    }
    // Save total count first
    await fetch(`${SHEETS_URL}?action=set&key=${encodeURIComponent(key + "__chunks")}&value=${encodeURIComponent(chunks.length)}`);
    // Save each chunk
    for (let i = 0; i < chunks.length; i++) {
      const res = await fetch(`${SHEETS_URL}?action=set&key=${encodeURIComponent(key + "__chunk__" + i)}&value=${encodeURIComponent(chunks[i])}`);
      await res.json();
    }
    return true;
  } catch { return false; }
}

async function sheetsGet(key) {
  try {
    // Check if data was saved in chunks
    const countRes = await fetch(`${SHEETS_URL}?action=get&key=${encodeURIComponent(key + "__chunks")}`);
    const countData = await countRes.json();
    if (countData.success) {
      const totalChunks = parseInt(countData.value);
      let combined = "";
      for (let i = 0; i < totalChunks; i++) {
        const res = await fetch(`${SHEETS_URL}?action=get&key=${encodeURIComponent(key + "__chunk__" + i)}`);
        const data = await res.json();
        if (data.success) combined += data.value;
      }
      return combined;
    }
    // Try single value
    const res = await fetch(`${SHEETS_URL}?action=get&key=${encodeURIComponent(key)}`);
    const data = await res.json();
    if (data.success) return data.value;
    return null;
  } catch { return null; }
}

function App() {
  const [logs, setLogs] = useState({});
  const [currentDate, setCurrentDate] = useState(todayStr());
  const [view, setView] = useState("today");
  const [foodInput, setFoodInput] = useState({name:"",cal:"",p:"",c:"",f:"",fi:""});
  const [waterInput, setWaterInput] = useState(250);
  const [saveStatus, setSaveStatus] = useState("idle");
  const [loading, setLoading] = useState(true);
  const saveTimer = useRef(null);

  useEffect(() => {
    (async () => {
      setLoading(true);
      try {
        const remote = await sheetsGet(STORAGE_KEY);
        if (remote) {
          const parsed = JSON.parse(remote);
          setLogs(parsed);
          localStorage.setItem(STORAGE_KEY, remote);
          setLoading(false);
          return;
        }
      } catch {}
      try {
        const local = localStorage.getItem(STORAGE_KEY);
        if (local) setLogs(JSON.parse(local));
      } catch {}
      setLoading(false);
    })();
  }, []);

  const persistLogs = useCallback((newLogs) => {
    const json = JSON.stringify(newLogs);
    try { localStorage.setItem(STORAGE_KEY, json); } catch {}
    setSaveStatus("saving");
    if (saveTimer.current) clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(async () => {
      const ok = await sheetsSet(STORAGE_KEY, json);
      setSaveStatus(ok ? "saved" : "local");
      setTimeout(() => setSaveStatus("idle"), 2500);
    }, 1500);
  }, []);

  const getDay = (date) => logs[date] || defaultDay(date);
  const day = getDay(currentDate);

  const updateDay = useCallback((fields) => {
    setLogs(prev => {
      const updated = { ...prev, [currentDate]: { ...(prev[currentDate] || defaultDay(currentDate)), ...fields } };
      persistLogs(updated);
      return updated;
    });
  }, [currentDate, persistLogs]);

  const addFood = () => {
    if (!foodInput.name) return;
    const item = {name:foodInput.name,cal:+foodInput.cal||0,p:+foodInput.p||0,c:+foodInput.c||0,f:+foodInput.f||0,fi:+foodInput.fi||0};
    const foods = [...(day.foods||[]), item];
    updateDay({foods,calories:foods.reduce((a,x)=>a+x.cal,0),protein:foods.reduce((a,x)=>a+x.p,0),carbs:foods.reduce((a,x)=>a+x.c,0),fat:foods.reduce((a,x)=>a+x.f,0),fiber:foods.reduce((a,x)=>a+(x.fi||0),0)});
    setFoodInput({name:"",cal:"",p:"",c:"",f:"",fi:""});
  };
  const removeFood = (i) => {
    const foods = day.foods.filter((_,idx)=>idx!==i);
    updateDay({foods,calories:foods.reduce((a,x)=>a+x.cal,0),protein:foods.reduce((a,x)=>a+x.p,0),carbs:foods.reduce((a,x)=>a+x.c,0),fat:foods.reduce((a,x)=>a+x.f,0),fiber:foods.reduce((a,x)=>a+(x.fi||0),0)});
  };
  const addWater = (ml) => updateDay({water:(day.water||0)+ml});

  const manualSave = async () => {
    setSaveStatus("saving");
    const ok = await sheetsSet(STORAGE_KEY, JSON.stringify(logs));
    setSaveStatus(ok ? "saved" : "local");
    setTimeout(() => setSaveStatus("idle"), 2500);
  };

  const S = {
    app:{minHeight:"100vh",background:"#0c0c10",color:"#f0ede8",paddingBottom:80},
    header:{padding:"22px 18px 14px",borderBottom:"1px solid rgba(255,255,255,0.06)"},
    badge:(color="#86efac")=>({display:"inline-flex",alignItems:"center",gap:5,background:`${color}18`,border:`1px solid ${color}30`,borderRadius:20,padding:"3px 10px",fontSize:11,color,letterSpacing:0.5}),
    nav:{display:"flex",gap:4,padding:"10px 18px",borderBottom:"1px solid rgba(255,255,255,0.06)",overflowX:"auto"},
    navBtn:(a)=>({padding:"7px 13px",borderRadius:20,border:"1px solid",borderColor:a?"rgba(134,239,172,0.4)":"rgba(255,255,255,0.1)",background:a?"rgba(134,239,172,0.1)":"transparent",color:a?"#86efac":"rgba(255,255,255,0.45)",fontSize:12,fontWeight:600,cursor:"pointer",whiteSpace:"nowrap"}),
    section:{padding:"0 18px",marginTop:18},
    card:{background:"rgba(255,255,255,0.035)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:16,padding:16,marginBottom:12},
    label:{fontSize:11,color:"rgba(255,255,255,0.38)",textTransform:"uppercase",letterSpacing:1,marginBottom:12},
    input:{background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:10,padding:"10px 12px",color:"#f0ede8",fontSize:14,width:"100%",boxSizing:"border-box",outline:"none"},
    btn:(v="def")=>({padding:"10px 16px",borderRadius:10,border:"none",background:v==="green"?"#86efac":v==="red"?"rgba(239,68,68,0.18)":v==="blue"?"rgba(56,189,248,0.15)":"rgba(255,255,255,0.08)",color:v==="green"?"#0c0c10":v==="red"?"#f87171":v==="blue"?"#38bdf8":"#f0ede8",fontSize:13,fontWeight:700,cursor:"pointer"}),
    toggle:(on)=>({width:44,height:24,borderRadius:12,background:on?"#86efac":"rgba(255,255,255,0.1)",cursor:"pointer",position:"relative",border:"none",flexShrink:0,transition:"background 0.2s"}),
    dot:(on)=>({position:"absolute",top:3,left:on?23:3,width:18,height:18,borderRadius:9,background:on?"#0c0c10":"rgba(255,255,255,0.4)",transition:"left 0.2s"}),
  };

  const MacroBar = ({label,val,max,color}) => (
    <div style={{marginBottom:8}}>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"rgba(255,255,255,0.5)",marginBottom:4}}>
        <span>{label}</span><span style={{color}}>{val}g / {max}g</span>
      </div>
      <div style={{height:6,background:"rgba(255,255,255,0.07)",borderRadius:3,overflow:"hidden"}}>
        <div style={{height:"100%",width:`${Math.min(100,(val/max)*100)}%`,background:color,borderRadius:3,transition:"width 0.4s"}}/>
      </div>
    </div>
  );

  const Ring = ({value,max,color,label,unit,size=80}) => {
    const r=(size-12)/2,circ=2*Math.PI*r,dash=circ*Math.min(1,value/max);
    return (
      <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
        <svg width={size} height={size} style={{transform:"rotate(-90deg)"}}>
          <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,0.07)" strokeWidth={10}/>
          <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={10} strokeDasharray={`${dash} ${circ-dash}`} strokeLinecap="round" style={{transition:"stroke-dasharray 0.5s"}}/>
          <text x={size/2} y={size/2+1} textAnchor="middle" dominantBaseline="middle" fill="#f0ede8" style={{transform:`rotate(90deg)`,transformOrigin:`${size/2}px ${size/2}px`,fontSize:13,fontFamily:"inherit",fontWeight:700}}>{value}</text>
        </svg>
        <span style={{fontSize:10,color:"rgba(255,255,255,0.4)",textTransform:"uppercase",letterSpacing:1}}>{label}</span>
        <span style={{fontSize:9,color:"rgba(255,255,255,0.25)"}}>{unit}</span>
      </div>
    );
  };

  const SaveBadge = () => {
    const cfg={saving:["#fbbf24","⏳ Saving..."],saved:["#86efac","✓ Saved to Sheets"],local:["#38bdf8","💾 Saved locally"],idle:null}[saveStatus];
    if(!cfg) return null;
    return <span style={{...S.badge(cfg[0]),marginLeft:8,fontSize:10}}>{cfg[1]}</span>;
  };

  const allDates = Object.keys(logs).sort();
  const latestWeight = allDates.reduceRight((acc,d)=>acc||(logs[d].weight?+logs[d].weight:null),null)||START_WEIGHT;
  const lost = +(START_WEIGHT-latestWeight).toFixed(1);
  const toGo = +(latestWeight-GOAL_WEIGHT).toFixed(1);
  const wk = weekNumber(currentDate);
  const dateLabel = new Date(currentDate+"T12:00:00").toLocaleDateString("en-US",{weekday:"long",month:"short",day:"numeric"});

  if (loading) return (
    <div style={{...S.app,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16,minHeight:"100vh"}}>
      <div style={{fontSize:40}}>🌿</div>
      <div style={{fontSize:16,fontWeight:700}}>Loading your data...</div>
      <div style={{fontSize:12,color:"rgba(255,255,255,0.4)"}}>Connecting to Google Sheets</div>
    </div>
  );

  return (
    <div style={S.app}>
      <div style={S.header}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
          <div style={{display:"flex",alignItems:"center",flexWrap:"wrap",gap:6}}>
            <span style={S.badge()}>✦ Week {wk} of 8</span>
            <SaveBadge/>
          </div>
          <button onClick={manualSave} style={{...S.btn("blue"),padding:"7px 14px",borderRadius:20,fontSize:12}}>☁️ Save</button>
        </div>
        <div style={{fontSize:21,fontWeight:800,margin:"6px 0 2px",letterSpacing:-0.5}}>Hey bestie! 👋</div>
        <div style={{fontSize:12,color:"rgba(255,255,255,0.38)"}}>{dateLabel} · {toGo>0?`${toGo}kg to goal`:"🎉 Goal reached!"}</div>
        <div style={{marginTop:14}}>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"rgba(255,255,255,0.38)",marginBottom:6}}>
            <span>Start: {START_WEIGHT}kg</span><span style={{color:"#86efac"}}>Lost: {lost}kg</span><span>Goal: {GOAL_WEIGHT}kg</span>
          </div>
          <div style={{height:8,background:"rgba(255,255,255,0.07)",borderRadius:4,overflow:"hidden"}}>
            <div style={{height:"100%",width:`${Math.min(100,(lost/5)*100)}%`,background:"linear-gradient(90deg,#86efac,#34d399)",borderRadius:4,transition:"width 0.5s"}}/>
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8,marginTop:14}}>
          <button style={{...S.btn(),padding:"6px 12px",fontSize:18}} onClick={()=>{const d=new Date(currentDate);d.setDate(d.getDate()-1);setCurrentDate(d.toISOString().split("T")[0]);}}>‹</button>
          <input type="date" value={currentDate} onChange={e=>setCurrentDate(e.target.value)} style={{...S.input,textAlign:"center",flex:1,fontSize:13}}/>
          <button style={{...S.btn(),padding:"6px 12px",fontSize:18}} onClick={()=>{const d=new Date(currentDate);d.setDate(d.getDate()+1);setCurrentDate(d.toISOString().split("T")[0]);}}>›</button>
        </div>
      </div>

      <div style={S.nav}>
        {[["today","📊 Overview"],["food","🍽 Food"],["water","💧 Water"],["supplements","💊 Supps"],["progress","🏆 Dashboard"]].map(([v,l])=>(
          <button key={v} style={S.navBtn(view===v)} onClick={()=>setView(v)}>{l}</button>
        ))}
      </div>

      {view==="today" && (
        <div style={S.section}>
          <div style={S.card}>
            <div style={S.label}>Daily Rings</div>
            <div style={{display:"flex",justifyContent:"space-around",flexWrap:"wrap",gap:12}}>
              <Ring value={day.calories} max={CALORIE_TARGET} color="#f97316" label="Calories" unit={`/ ${CALORIE_TARGET}`}/>
              <Ring value={day.water||0} max={WATER_TARGET} color="#38bdf8" label="Water" unit="ml"/>
              <Ring value={day.steps||0} max={STEPS_TARGET} color="#86efac" label="Steps" unit={`/ ${STEPS_TARGET}`}/>
            </div>
          </div>
          <div style={S.card}>
            <div style={S.label}>Macro Split</div>
            <MacroBar label="Protein" val={day.protein||0} max={PROTEIN_TARGET} color="#c084fc"/>
            <MacroBar label="Carbs" val={day.carbs||0} max={CARBS_TARGET} color="#fbbf24"/>
            <MacroBar label="Fat" val={day.fat||0} max={FAT_TARGET} color="#f97316"/>
            <MacroBar label="Fiber" val={day.fiber||0} max={FIBER_TARGET} color="#34d399"/>
            <div style={{display:"flex",gap:6,marginTop:10}}>
              {[["P",day.protein||0,"#c084fc"],["C",day.carbs||0,"#fbbf24"],["F",day.fat||0,"#f97316"],["Fi",day.fiber||0,"#34d399"]].map(([l,v,c])=>(
                <div key={l} style={{flex:1,background:"rgba(255,255,255,0.03)",borderRadius:10,padding:"10px 4px",textAlign:"center"}}>
                  <div style={{fontSize:16,fontWeight:800,color:c}}>{v}g</div>
                  <div style={{fontSize:10,color:"rgba(255,255,255,0.35)",marginTop:2}}>{l}</div>
                </div>
              ))}
            </div>
          </div>
          <div style={S.card}>
            <div style={S.label}>Checklist</div>
            {[["prenatal","💊 Prenatal vitamins"],["magnesium","🧲 Magnesium"],["workout","🏋️ Workout done"],["hadFruit","🍎 Had fruit today"]].map(([key,label])=>(
              <div key={key} style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
                <span style={{fontSize:14,color:day[key]?"#f0ede8":"rgba(255,255,255,0.45)"}}>{label}</span>
                <button style={S.toggle(day[key])} onClick={()=>updateDay({[key]:!day[key]})}><div style={S.dot(day[key])}/></button>
              </div>
            ))}
            {day.workout && <input placeholder="Workout type (e.g. Apple Fitness HIIT)" value={day.workoutType||""} style={S.input} onChange={e=>updateDay({workoutType:e.target.value})}/>}
          </div>
          <div style={S.card}>
            <div style={S.label}>Weight</div>
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              <input type="number" placeholder="kg" value={day.weight||""} style={{...S.input,flex:1}} step="0.1" onChange={e=>updateDay({weight:e.target.value})}/>
              {day.weight && <div style={{fontSize:11,color:"rgba(255,255,255,0.38)",minWidth:70}}>{+(day.weight-GOAL_WEIGHT).toFixed(1)}kg to goal</div>}
            </div>
          </div>
          <div style={S.card}>
            <div style={S.label}>Steps</div>
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              <input type="number" placeholder="Steps today" value={day.steps||""} style={{...S.input,flex:1}} onChange={e=>updateDay({steps:+e.target.value})}/>
              <div style={{fontSize:22}}>{(day.steps||0)>=STEPS_TARGET?"✅":"🚶"}</div>
            </div>
            <div style={{fontSize:11,color:"rgba(255,255,255,0.35)",marginTop:6}}>{(day.steps||0)>=STEPS_TARGET?"Goal hit! 🎉":`${STEPS_TARGET-(day.steps||0)} steps to go`}</div>
          </div>
          <div style={S.card}>
            <div style={S.label}>Notes</div>
            <textarea placeholder="How are you feeling? Cravings, sleep, mood..." value={day.notes||""} rows={3} style={{...S.input,resize:"vertical"}} onChange={e=>updateDay({notes:e.target.value})}/>
          </div>
          <div style={S.card}>
            <div style={S.label}>Daily Targets</div>
            {[["🔥 Calories","1,450 kcal","#f97316"],["💪 Protein","100g","#c084fc"],["🌾 Carbs","150g","#fbbf24"],["🥑 Fat","50g","#f97316"],["🥦 Fiber","25g","#34d399"],["💧 Water","2,500ml","#38bdf8"],["🚶 Steps","6,000","#86efac"]].map(([l,v,c])=>(
              <div key={l} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid rgba(255,255,255,0.04)"}}>
                <span style={{fontSize:13,color:"rgba(255,255,255,0.55)"}}>{l}</span>
                <span style={{fontSize:13,fontWeight:700,color:c}}>{v}</span>
              </div>
            ))}
            <div style={{marginTop:10,fontSize:11,color:"rgba(255,255,255,0.25)",textAlign:"center"}}>8-week program · Goal: 67kg · Start: 72kg</div>
          </div>
        </div>
      )}

      {view==="food" && (
        <div style={S.section}>
          <div style={S.card}>
            <div style={S.label}>Log Food</div>
            <input placeholder="Food name" value={foodInput.name} style={{...S.input,marginBottom:8}} onChange={e=>setFoodInput({...foodInput,name:e.target.value})}/>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
              {[["cal","Calories"],["p","Protein (g)"],["c","Carbs (g)"],["f","Fat (g)"],["fi","Fiber (g)"]].map(([k,ph])=>(
                <input key={k} placeholder={ph} type="number" value={foodInput[k]} style={S.input} onChange={e=>setFoodInput({...foodInput,[k]:e.target.value})}/>
              ))}
            </div>
            <button style={{...S.btn("green"),width:"100%"}} onClick={addFood}>+ Add Food</button>
          </div>
          <div style={S.card}>
            <div style={S.label}>Daily Summary</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              {[["🔥 Cal",`${day.calories}/${CALORIE_TARGET}`,(day.calories/CALORIE_TARGET)*100,"#f97316"],
                ["💪 Protein",`${day.protein||0}g/${PROTEIN_TARGET}g`,((day.protein||0)/PROTEIN_TARGET)*100,"#c084fc"],
                ["🌾 Carbs",`${day.carbs||0}g/${CARBS_TARGET}g`,((day.carbs||0)/CARBS_TARGET)*100,"#fbbf24"],
                ["🥑 Fat",`${day.fat||0}g/${FAT_TARGET}g`,((day.fat||0)/FAT_TARGET)*100,"#f97316"],
                ["🥦 Fiber",`${day.fiber||0}g/25g`,((day.fiber||0)/25)*100,"#34d399"],
              ].map(([l,v,pct,c])=>(
                <div key={l} style={{background:"rgba(255,255,255,0.03)",borderRadius:10,padding:12}}>
                  <div style={{fontSize:10,color:"rgba(255,255,255,0.38)",marginBottom:4}}>{l}</div>
                  <div style={{fontSize:13,fontWeight:700,color:c}}>{v}</div>
                  <div style={{height:4,background:"rgba(255,255,255,0.06)",borderRadius:2,marginTop:6,overflow:"hidden"}}>
                    <div style={{height:"100%",width:`${Math.min(100,pct)}%`,background:c,borderRadius:2,transition:"width 0.4s"}}/>
                  </div>
                </div>
              ))}
            </div>
          </div>
          {(day.foods||[]).length>0 && (
            <div style={S.card}>
              <div style={S.label}>Food Log</div>
              {(day.foods||[]).map((item,i)=>(
                <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:"1px solid rgba(255,255,255,0.05)"}}>
                  <div>
                    <div style={{fontSize:14}}>{item.name}</div>
                    <div style={{fontSize:11,color:"rgba(255,255,255,0.38)",marginTop:2}}>{item.cal}kcal · P:{item.p}g · C:{item.c}g · F:{item.f}g{item.fi?` · Fi:${item.fi}g`:""}</div>
                  </div>
                  <button style={{...S.btn("red"),padding:"6px 10px"}} onClick={()=>removeFood(i)}>✕</button>
                </div>
              ))}
            </div>
          )}
        </div>
      )}

      {view==="water" && (
        <div style={S.section}>
          <div style={S.card}>
            <div style={{textAlign:"center",padding:"16px 0"}}>
              <div style={{fontSize:56,fontWeight:900,color:"#38bdf8"}}>{day.water||0}</div>
              <div style={{fontSize:13,color:"rgba(255,255,255,0.38)"}}>ml of {WATER_TARGET}ml</div>
              <div style={{margin:"18px auto",width:140,height:140,borderRadius:"50%",border:"10px solid rgba(56,189,248,0.12)",display:"flex",alignItems:"center",justifyContent:"center",position:"relative",overflow:"hidden"}}>
                <div style={{position:"absolute",bottom:0,left:0,right:0,height:`${Math.min(100,((day.water||0)/WATER_TARGET)*100)}%`,background:"linear-gradient(180deg,rgba(56,189,248,0.55),rgba(14,165,233,0.8))",transition:"height 0.5s"}}/>
                <span style={{fontSize:28,zIndex:1}}>💧</span>
              </div>
              <div style={{fontSize:13,color:(day.water||0)>=WATER_TARGET?"#86efac":"rgba(255,255,255,0.38)"}}>{(day.water||0)>=WATER_TARGET?"Hydration goal crushed! 🎉":`${WATER_TARGET-(day.water||0)}ml remaining`}</div>
            </div>
          </div>
          <div style={S.card}>
            <div style={S.label}>Quick Add</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
              {[150,200,250,300,350,500].map(ml=>(
                <button key={ml} style={{...S.btn(),padding:14,fontSize:13,fontWeight:700,borderRadius:12}} onClick={()=>addWater(ml)}>+{ml}ml</button>
              ))}
            </div>
            <div style={{display:"flex",gap:8,marginTop:12}}>
              <input type="number" value={waterInput} style={{...S.input,flex:1}} onChange={e=>setWaterInput(+e.target.value)}/>
              <button style={{...S.btn("green"),padding:"10px 16px"}} onClick={()=>{addWater(waterInput);setWaterInput(250);}}>Add</button>
            </div>
            {(day.water||0)>0 && <button style={{...S.btn("red"),width:"100%",marginTop:8}} onClick={()=>updateDay({water:0})}>Reset</button>}
          </div>
        </div>
      )}

      {view==="supplements" && (
        <div style={S.section}>
          <div style={S.card}>
            <div style={S.label}>Daily Supplements</div>
            {[["prenatal","💊","Prenatal Vitamins","Take with food","#c084fc"],["magnesium","🧲","Magnesium","Best taken at night","#38bdf8"]].map(([key,icon,name,tip,color])=>(
              <div key={key} style={{display:"flex",alignItems:"center",gap:14,padding:"14px 0",borderBottom:"1px solid rgba(255,255,255,0.05)"}}>
                <div style={{width:44,height:44,borderRadius:12,background:`${color}18`,border:`1px solid ${color}30`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0}}>{icon}</div>
                <div style={{flex:1}}>
                  <div style={{fontSize:14,fontWeight:600}}>{name}</div>
                  <div style={{fontSize:11,color:"rgba(255,255,255,0.38)",marginTop:2}}>{tip}</div>
                </div>
                <button style={S.toggle(day[key])} onClick={()=>updateDay({[key]:!day[key]})}><div style={S.dot(day[key])}/></button>
              </div>
            ))}
          </div>
          <div style={{...S.card,background:"rgba(134,239,172,0.04)",border:"1px solid rgba(134,239,172,0.12)"}}>
            <div style={S.label}>Why these matter</div>
            <p style={{fontSize:13,color:"rgba(255,255,255,0.55)",lineHeight:1.7,margin:"0 0 10px"}}>💊 <strong style={{color:"#c084fc"}}>Prenatals</strong> — Essential folate, iron & B12 for your health journey.</p>
            <p style={{fontSize:13,color:"rgba(255,255,255,0.55)",lineHeight:1.7,margin:0}}>🧲 <strong style={{color:"#38bdf8"}}>Magnesium</strong> — Supports sleep, muscle recovery and reduces cravings.</p>
          </div>
        </div>
      )}

      {view==="progress" && (()=>{
        const totalDays = allDates.length;
        const weekNum = weekNumber(todayStr());
        const pctToGoal = Math.min(100, Math.round((lost/5)*100));

        // Streaks
        const sortedDates = [...allDates].sort();
        let stepStreak=0, suppStreak=0, curStepStreak=0, curSuppStreak=0;
        for(let i=sortedDates.length-1;i>=0;i--){
          const d=sortedDates[i];
          if((logs[d]?.steps||0)>=STEPS_TARGET){curStepStreak++;stepStreak=Math.max(stepStreak,curStepStreak);}else{if(i===sortedDates.length-1)curStepStreak=0;else break;}
          if(logs[d]?.prenatal&&logs[d]?.magnesium){curSuppStreak++;suppStreak=Math.max(suppStreak,curSuppStreak);}
        }

        // Weekly scores
        const weekScores = Array.from({length:8},(_,i)=>i+1).map(w=>{
          const wkDays=allDates.filter(d=>weekNumber(d)===w);
          if(!wkDays.length) return {w,score:0,active:false};
          const wo=wkDays.filter(d=>logs[d]?.workout).length;
          const st=wkDays.filter(d=>(logs[d]?.steps||0)>=STEPS_TARGET).length;
          const wa=wkDays.filter(d=>(logs[d]?.water||0)>=WATER_TARGET).length;
          const su=wkDays.filter(d=>logs[d]?.prenatal&&logs[d]?.magnesium).length;
          const score = Math.round(((wo/Math.min(3,wkDays.length))+(st/wkDays.length)+(wa/wkDays.length)+(su/wkDays.length))/4*10);
          return {w,score,active:true,wo,st,wa,su,days:wkDays.length};
        });

        // Habit grid for last 14 days
        const last14 = sortedDates.slice(-14);
        const habits = [
          {label:"🏋️",key:"workout",fn:d=>logs[d]?.workout},
          {label:"💊",key:"supps",fn:d=>logs[d]?.prenatal&&logs[d]?.magnesium},
          {label:"🚶",key:"steps",fn:d=>(logs[d]?.steps||0)>=STEPS_TARGET},
          {label:"💧",key:"water",fn:d=>(logs[d]?.water||0)>=WATER_TARGET},
          {label:"🌿",key:"husk",fn:d=>logs[d]?.foods?.some(f=>f.name?.toLowerCase().includes("psyllium"))},
        ];

        // Motivational message
        const msgs = pctToGoal>=80?"You're almost there! 🎯 The finish line is in sight."
          :pctToGoal>=50?"Halfway and building momentum. Keep going! 💪"
          :pctToGoal>=25?"Strong start — the habits are taking shape. 🌿"
          :"Every great journey starts exactly like this. Day by day. 🌱";

        return (
        <div style={S.section}>

          {/* Hero goal card */}
          <div style={{...S.card,background:"linear-gradient(135deg,rgba(159,216,168,0.12),rgba(52,211,153,0.06))",border:"1px solid rgba(134,239,172,0.25)",marginBottom:12}}>
            <div style={{fontSize:11,color:"rgba(134,239,172,0.7)",letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:8}}>8-Week Goal</div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",marginBottom:14}}>
              <div>
                <div style={{fontSize:36,fontWeight:900,color:"#86efac",lineHeight:1}}>{pctToGoal}%</div>
                <div style={{fontSize:12,color:"rgba(255,255,255,0.5)",marginTop:4}}>of 5kg goal reached</div>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontSize:11,color:"rgba(255,255,255,0.4)"}}>Week {weekNum} of 8</div>
                <div style={{fontSize:11,color:"rgba(255,255,255,0.4)",marginTop:2}}>{totalDays} days logged</div>
              </div>
            </div>
            <div style={{height:10,background:"rgba(255,255,255,0.07)",borderRadius:5,overflow:"hidden",marginBottom:10}}>
              <div style={{height:"100%",width:`${pctToGoal}%`,background:"linear-gradient(90deg,#86efac,#34d399)",borderRadius:5,transition:"width 0.8s ease"}}/>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
              {[["Start","72kg","#f97316"],["Now",`${latestWeight}kg`,"#f0ede8"],["Goal","67kg","#86efac"]].map(([l,v,c])=>(
                <div key={l} style={{background:"rgba(0,0,0,0.2)",borderRadius:10,padding:"10px 8px",textAlign:"center"}}>
                  <div style={{fontSize:18,fontWeight:800,color:c}}>{v}</div>
                  <div style={{fontSize:10,color:"rgba(255,255,255,0.35)",marginTop:2}}>{l}</div>
                </div>
              ))}
            </div>
            <div style={{marginTop:12,fontSize:13,color:"rgba(255,255,255,0.6)",fontStyle:"italic",textAlign:"center"}}>{msgs}</div>
          </div>

          {/* Streak cards */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:12}}>
            {[
              {label:"Step streak",val:`${curStepStreak}d`,sub:"days in a row",color:"#86efac",icon:"🚶"},
              {label:"Supplement streak",val:`${curSuppStreak}d`,sub:"days in a row",color:"#c084fc",icon:"💊"},
              {label:"Days logged",val:totalDays,sub:"total days tracked",color:"#38bdf8",icon:"📋"},
            ].map(t=>(
              <div key={t.label} style={{...S.card,textAlign:"center",padding:"14px 8px",marginBottom:0}}>
                <div style={{fontSize:20,marginBottom:4}}>{t.icon}</div>
                <div style={{fontSize:24,fontWeight:900,color:t.color}}>{t.val}</div>
                <div style={{fontSize:10,color:"rgba(255,255,255,0.35)",marginTop:3}}>{t.sub}</div>
              </div>
            ))}
          </div>

          {/* Weekly arc */}
          <div style={S.card}>
            <div style={S.label}>Weekly Progress</div>
            <div style={{display:"flex",gap:6,alignItems:"flex-end",height:90,marginBottom:8}}>
              {weekScores.map(({w,score,active,wo,st,wa,su,days})=>{
                const isCurrent=weekNumber(todayStr())===w;
                const h=active?Math.max(12,(score/10)*80):12;
                return (
                  <div key={w} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
                    <div style={{width:"100%",height:h,borderRadius:4,background:isCurrent?"#86efac":active?"rgba(134,239,172,0.4)":"rgba(255,255,255,0.06)",transition:"height 0.5s",position:"relative",display:"flex",alignItems:"center",justifyContent:"center"}}>
                      {active&&score>0&&<span style={{fontSize:9,fontWeight:700,color:isCurrent?"#0c0c10":"rgba(255,255,255,0.7)"}}>{score}</span>}
                    </div>
                    <span style={{fontSize:10,color:isCurrent?"#86efac":"rgba(255,255,255,0.35)"}}>W{w}</span>
                  </div>
                );
              })}
            </div>
            <div style={{fontSize:11,color:"rgba(255,255,255,0.35)",textAlign:"center"}}>bar height = consistency score (0-10) · green = current week</div>
          </div>

          {/* Habit grid */}
          <div style={S.card}>
            <div style={S.label}>Last 14 Days — Habit Grid</div>
            <div style={{overflowX:"auto"}}>
              <div style={{display:"grid",gridTemplateColumns:"28px repeat(14,1fr)",gap:5,minWidth:320,alignItems:"center"}}>
                <div/>
                {last14.map(d=>(
                  <div key={d} style={{textAlign:"center",fontSize:9,color:"rgba(255,255,255,0.3)"}}>
                    {new Date(d+"T12:00:00").toLocaleDateString("en-US",{day:"numeric"})}
                  </div>
                ))}
                {habits.map(h=>(
                  <React.Fragment key={h.key}>
                    <div style={{fontSize:13,textAlign:"center"}}>{h.label}</div>
                    {last14.map(d=>(
                      <div key={d} style={{width:"100%",paddingBottom:"100%",position:"relative"}}>
                        <div style={{position:"absolute",inset:1,borderRadius:3,background:h.fn(d)?"#86efac":"rgba(255,255,255,0.05)",border:`1px solid ${h.fn(d)?"rgba(134,239,172,0.4)":"rgba(255,255,255,0.06)"}`}}/>
                      </div>
                    ))}
                  </React.Fragment>
                ))}
              </div>
            </div>
            <div style={{display:"flex",gap:12,marginTop:12,fontSize:11,color:"rgba(255,255,255,0.4)"}}>
              <span><span style={{color:"#86efac"}}>■</span> done</span>
              <span><span style={{color:"rgba(255,255,255,0.1)"}}>■</span> missed</span>
            </div>
          </div>

          {/* Weekly detail */}
          <div style={S.card}>
            <div style={S.label}>Week by Week</div>
            {weekScores.filter(w=>w.active).map(({w,score,wo,st,wa,su,days})=>{
              const isCurrent=weekNumber(todayStr())===w;
              return (
                <div key={w} style={{display:"flex",alignItems:"center",gap:10,padding:"12px 0",borderBottom:"1px solid rgba(255,255,255,0.04)",opacity:isCurrent?1:0.7}}>
                  <div style={{width:38,height:38,borderRadius:"50%",background:isCurrent?"rgba(134,239,172,0.15)":"rgba(255,255,255,0.04)",border:`2px solid ${isCurrent?"#86efac":"rgba(255,255,255,0.1)"}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,color:isCurrent?"#86efac":"rgba(255,255,255,0.5)",flexShrink:0}}>W{w}</div>
                  <div style={{flex:1}}>
                    <div style={{display:"flex",gap:10,fontSize:11,color:"rgba(255,255,255,0.5)",flexWrap:"wrap"}}>
                      <span>🏋️ {wo}/{Math.min(3,days)}</span>
                      <span>🚶 {st}/{days}</span>
                      <span>💧 {wa}/{days}</span>
                      <span>💊 {su}/{days}</span>
                    </div>
                  </div>
                  <div style={{fontSize:18,fontWeight:800,color:score>=8?"#86efac":score>=6?"#fbbf24":"#f87171"}}>{score}<span style={{fontSize:11,fontWeight:400,color:"rgba(255,255,255,0.3)"}}>/10</span></div>
                  {wo>=3&&<span>🔥</span>}
                </div>
              );
            })}
          </div>

          {/* Weight history */}
          <div style={S.card}>
            <div style={S.label}>Weight History</div>
            {allDates.filter(d=>logs[d]?.weight).length===0
              ? <div style={{color:"rgba(255,255,255,0.28)",fontSize:13}}>No weight entries yet.</div>
              : allDates.filter(d=>logs[d]?.weight).map(d=>(
                <div key={d} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid rgba(255,255,255,0.04)",fontSize:13}}>
                  <span style={{color:"rgba(255,255,255,0.45)"}}>{new Date(d+"T12:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"})}</span>
                  <span style={{fontWeight:700}}>{logs[d].weight}kg</span>
                </div>
              ))
            }
          </div>

          {/* Import */}
          <div style={S.card}>
            <div style={S.label}>Import Data</div>
            <textarea id="importBox" rows={4} placeholder="Paste JSON data here..." style={{...S.input,resize:"vertical",fontSize:12,marginBottom:8}}/>
            <div style={{display:"flex",gap:8}}>
              <button style={{...S.btn("green"),flex:1}} onClick={()=>{
                try{
                  const raw=document.getElementById("importBox").value.trim();
                  const parsed=JSON.parse(raw);
                  setLogs(parsed);
                  localStorage.setItem(STORAGE_KEY,JSON.stringify(parsed));
                  document.getElementById("importBox").value="";
                  alert("✅ Data imported!");
                }catch(e){alert("❌ Invalid JSON. Copy the full block from Claude.");}
              }}>Import</button>
              <button style={{...S.btn("red"),flex:1}} onClick={()=>{if(confirm("Clear ALL data?")){{setLogs({});localStorage.removeItem(STORAGE_KEY);}}}}>Clear All</button>
            </div>
          </div>

        </div>
        );
      })()}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
